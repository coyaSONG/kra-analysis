schemaVersion: "0.1"

project:
  name: kra-autoresearch-clean
  artifact: generic
  baselineRef: rrx-holdout-baseline-20260411
  workspace: git

scope:
  allowedGlobs:
    - "packages/scripts/autoresearch/clean_model_config.json"
    - "packages/scripts/autoresearch/extract_rrx_metric.py"
    - "packages/scripts/autoresearch/rrx_propose.py"
    - "packages/scripts/autoresearch/seed_matrix_runner.py"
    - "packages/scripts/autoresearch/seed_summary_report.py"
    - "packages/scripts/autoresearch/run_rrx_experiment.sh"
    - "packages/scripts/autoresearch/run_rrx_metric.sh"
    - "packages/scripts/autoresearch/run_rrx_propose.sh"
    - ".ralph/**"
    - ".ralph-holdout/**"
  maxFilesChanged: 5
  maxLineDelta: 300

proposer:
  type: command
  command: "/Users/chsong/Developer/Personal/kra-analysis/packages/scripts/autoresearch/run_rrx_propose.sh"

experiment:
  run:
    command: "/Users/chsong/Developer/Personal/kra-analysis/packages/scripts/autoresearch/run_rrx_experiment.sh"
  outputs:
    - id: holdout_seed_summary
      path: .ralph/outputs/holdout_seed_summary_report.json

metrics:
  catalog:
    - id: holdout_lowest_hit_rate
      kind: numeric
      direction: maximize
      extractor:
        type: command
        command: "/Users/chsong/Developer/Personal/kra-analysis/packages/scripts/autoresearch/run_rrx_metric.sh"
        parser: plain_number

frontier:
  strategy: single_best
  primaryMetric: holdout_lowest_hit_rate

ratchet:
  type: epsilon_improve
  metric: holdout_lowest_hit_rate
  epsilon: 0

stopping:
  target:
    metric: holdout_lowest_hit_rate
    op: ">="
    value: 0.7

storage:
  root: .ralph-holdout
